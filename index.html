<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Google Dashboard</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ── VARIABLES ── */
:root{
  --blue:#1a73e8;--green:#34A853;--yellow:#F9AB00;--red:#EA4335;
  --bg:#F0F2F5;--panel:#fff;--bd:#E8EAED;
  --t1:#202124;--t2:#5F6368;--t3:#9AA0A6;
  --hover:#F8F9FA;--inp:#fff;--shadow:rgba(0,0,0,.08);
  --th-t:#FFFDE7;--th-c:#E8F5E9;--th-g:#FCE8E6;
  --cal-o:#FAFAFA;--cal-td:#E8F0FE;
  --hd:52px;--bnav:62px;
}
body.dark{
  --bg:#121212;--panel:#1e1e1e;--bd:#2e2e2e;
  --t1:#e8eaed;--t2:#9aa0a6;--t3:#5f6368;
  --hover:#252525;--inp:#2d2d2d;--shadow:rgba(0,0,0,.4);
  --th-t:#242010;--th-c:#102010;--th-g:#230f0f;
  --cal-o:#181818;--cal-td:#1a2744;
}
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Google Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;font-size:15px;transition:background .2s,color .2s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
/* ── HEADER ── */
.hd{height:var(--hd);background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:0 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(26,115,232,.35);flex-shrink:0;z-index:300}
.hd-title{font-size:16px;font-weight:800;letter-spacing:-.4px}
.hd-date{opacity:.7;font-size:12px}
.hd-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.btn-login{background:#fff;color:var(--blue);border:none;border-radius:20px;padding:6px 16px;cursor:pointer;font-size:13px;font-weight:700}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px}
.btn-ghost:hover{background:rgba(255,255,255,.25)}
/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;background:var(--bg)}
.sidebar{width:270px;flex-shrink:0;background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.view{display:none;flex-direction:column;overflow:hidden}
.view.on{display:flex}
/* ── PANEL HEADER ── */
.ph{padding:10px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;border-bottom:2px solid transparent}
.ph .lbl{font-weight:700;font-size:14px;color:var(--t1)}
.ph .r{margin-left:auto;display:flex;align-items:center;gap:5px}
.badge{border-radius:10px;padding:2px 9px;font-size:12px;font-weight:700}
.btn-col{background:none;border:none;cursor:pointer;font-size:13px;color:var(--t3);padding:2px 5px;border-radius:4px}
.btn-col:hover{background:rgba(128,128,128,.12);color:var(--t1)}
/* ── TASKS ── */
.th-t{background:var(--th-t);border-color:rgba(249,171,0,.3)}
.t-row{padding:9px 10px;border-bottom:1px solid var(--bd);display:flex;gap:7px;flex-shrink:0}
.t-inp{flex:1;border:1.5px solid var(--bd);border-radius:7px;padding:8px 10px;font-size:14px;outline:none;background:var(--inp);color:var(--t1);transition:border-color .2s}
.t-inp::placeholder{color:var(--t3)}
.t-inp:focus{border-color:var(--blue)}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:8px 13px;cursor:pointer;font-size:18px;font-weight:700;line-height:1}
.btn-exp{background:none;border:1px solid var(--bd);border-radius:6px;padding:8px 8px;cursor:pointer;color:var(--t3);font-size:14px;line-height:1}
.btn-exp:hover{background:var(--hover);color:var(--t1)}
.t-detail{display:none;flex-direction:column;gap:6px;padding:8px 10px;border-bottom:1px solid var(--bd);background:var(--hover);flex-shrink:0}
.t-detail.on{display:flex}
.t-det-row{display:flex;align-items:center;gap:7px}
.t-det-lbl{font-size:12px;color:var(--t3);min-width:40px;font-weight:600}
.t-det-inp{flex:1;border:1.5px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:13px;background:var(--inp);color:var(--t1);outline:none}
.t-det-inp:focus{border-color:var(--blue)}
.t-list{flex:1;overflow-y:auto;padding:6px}
.t-item{display:flex;align-items:flex-start;gap:8px;padding:9px 8px;border-radius:8px;transition:background .15s}
.t-item:hover{background:var(--hover)}
.t-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green);flex-shrink:0;margin-top:2px}
.t-info{flex:1;min-width:0}
.t-txt{font-size:14px;line-height:1.4;color:var(--t1)}
.t-txt.done{text-decoration:line-through;color:var(--t3)}
.t-meta{font-size:12px;color:var(--t3);margin-top:2px}
.t-del{display:none;background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;line-height:1;flex-shrink:0}
.t-item:hover .t-del{display:block}
.sec-lbl{font-size:12px;color:var(--t3);font-weight:700;padding:10px 14px 4px;text-transform:uppercase;letter-spacing:.5px}
/* ── CALENDAR ── */
.th-c{background:var(--th-c);border-color:rgba(52,168,83,.3)}
.cal-grid-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--bd)}
.cal-dow-cell{text-align:center;font-size:12px;font-weight:700;color:var(--t3);padding:6px 0;text-transform:uppercase}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow:hidden;align-content:start}
.cal-day{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:3px;cursor:pointer;transition:background .15s;background:var(--panel);overflow:hidden}
.cal-day:hover{background:var(--hover)}
.cal-day.other{background:var(--cal-o)}
.cal-day.other .cal-dn{color:var(--bd)}
.cal-day.today-c{background:var(--cal-td)}
.cal-dn{font-size:12px;font-weight:500;width:21px;height:21px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px;color:var(--t1)}
.today-c .cal-dn{background:var(--blue);color:#fff;font-weight:700}
.cal-ev{font-size:11px;border-radius:3px;padding:1px 5px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff;font-weight:500}
.cal-ev.task-ev{background:transparent!important;color:var(--t1);padding-left:2px;display:flex;align-items:center;gap:3px}
.task-dot{width:8px;height:8px;border-radius:50%;background:#4285F4;flex-shrink:0;display:inline-block}
.cal-more{font-size:10px;color:var(--t3)}
/* ── EVENT PANEL ── */
.ev-panel{position:fixed;right:0;top:var(--hd);bottom:0;width:300px;background:var(--panel);border-left:1px solid var(--bd);box-shadow:-4px 0 16px var(--shadow);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s}
.ev-panel.on{transform:none}
.ev-ph{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ev-ph-ttl{font-weight:700;font-size:14px;flex:1;color:var(--t1)}
.btn-x{background:none;border:none;cursor:pointer;color:var(--t3);font-size:22px;line-height:1}
.btn-new-ev{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
.ev-body{flex:1;overflow-y:auto;padding:12px}
.ev-card{border-left:4px solid;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.ev-card-title{font-weight:600;font-size:14px;color:var(--t1)}
.ev-card-sub{font-size:12px;color:var(--t2);margin-top:3px}
.ev-card-acts{display:flex;gap:5px;margin-top:7px}
.btn-ev{background:none;border:1px solid var(--bd);border-radius:5px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--t2);transition:all .15s}
.btn-ev:hover{background:var(--hover)}
.btn-ev.del:hover{background:#fdeded;color:var(--red);border-color:var(--red)}
.ev-none{text-align:center;padding:30px;color:var(--t3);font-size:13px}
/* ── EVENT FORM ── */
.ev-form{display:flex;flex-direction:column;gap:8px}
.ef-sect{background:var(--hover);border-radius:8px;padding:9px 10px;display:flex;flex-direction:column;gap:6px}
.ef-row{display:flex;align-items:center;gap:7px}
.ef-lbl{font-size:12px;color:var(--t3);min-width:48px;font-weight:600;flex-shrink:0}
.ef-inp{flex:1;border:1.5px solid var(--bd);border-radius:6px;padding:6px 9px;font-size:13px;background:var(--inp);color:var(--t1);outline:none;transition:border-color .2s;min-width:0}
.ef-inp::placeholder{color:var(--t3)}
.ef-inp:focus{border-color:var(--blue)}
.ef-sel{flex:1;border:1.5px solid var(--bd);border-radius:6px;padding:6px 9px;font-size:13px;background:var(--inp);color:var(--t1);outline:none}
.ef-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.ev-cal-btn{display:flex;align-items:center;gap:7px;border:1.5px solid var(--bd);border-radius:6px;padding:7px 9px;cursor:pointer;background:var(--inp)}
.ev-cal-list{display:none;position:absolute;left:0;right:0;top:calc(100% + 3px);background:var(--panel);border:1px solid var(--bd);border-radius:7px;box-shadow:0 4px 14px var(--shadow);z-index:500;max-height:160px;overflow-y:auto}
.ev-cal-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:13px;color:var(--t1);transition:background .15s}
.ev-cal-opt:hover{background:var(--hover)}
.ev-cdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;display:inline-block}
.ev-chips{display:flex;flex-wrap:wrap;gap:6px}
.ev-chip{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ev-chip.sel,.ev-chip:hover{border-color:var(--t1)!important}
.btn-ev-save{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:700}
.btn-ev-cancel{background:none;border:1px solid var(--bd);border-radius:6px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--t2)}

/* ── GMAIL ── */
.th-g{background:var(--th-g);border-color:rgba(234,67,53,.3)}
.gmail-wrap{display:flex;flex:1;overflow:hidden}
.g-labels{width:150px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--bd);overflow-y:auto;padding:6px 0}
.glbl{display:flex;align-items:center;gap:7px;padding:8px 10px;cursor:pointer;border-radius:0 20px 20px 0;margin-right:6px;font-size:13px;font-weight:500;color:var(--t1);transition:background .15s}
.glbl:hover{background:var(--hover)}
.glbl.on{background:var(--cal-td);color:var(--blue);font-weight:700}
.glbl .ico{font-size:14px;width:18px;text-align:center}
.glbl .cnt{margin-left:auto;font-size:11px;background:var(--red);color:#fff;border-radius:8px;padding:1px 6px;font-weight:700}
.g-main{flex:1;display:flex;overflow:hidden}
.g-list-col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd);background:var(--panel)}
.g-srch-row{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;gap:6px;flex-shrink:0}
.g-srch-inp{flex:1;border:1.5px solid var(--bd);border-radius:18px;padding:7px 13px;font-size:13px;outline:none;background:var(--inp);color:var(--t1);transition:border-color .2s}
.g-srch-inp::placeholder{color:var(--t3)}
.g-srch-inp:focus{border-color:var(--blue)}
.btn-srch{background:var(--blue);color:#fff;border:none;border-radius:18px;padding:7px 13px;cursor:pointer;font-size:13px}
.g-selall{display:flex;align-items:center;gap:8px;padding:6px 11px;border-bottom:1px solid var(--bd);background:var(--panel);flex-shrink:0}
.g-selall label{font-size:13px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.g-sel-cnt{font-size:12px;color:var(--t3);margin-left:4px}
.sel-bar{display:none;align-items:center;gap:7px;padding:7px 10px;background:var(--cal-td);border-bottom:1px solid var(--bd);flex-shrink:0}
.sel-bar.on{display:flex}
.sel-cnt{font-size:13px;font-weight:700;color:var(--blue)}
.btn-sdel{background:var(--red);color:#fff;border:none;border-radius:5px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:700}
.btn-sread{background:var(--panel);color:var(--t2);border:1px solid var(--bd);border-radius:5px;padding:5px 11px;cursor:pointer;font-size:12px}
.btn-sx{background:none;border:none;cursor:pointer;color:var(--t3);font-size:20px;margin-left:auto;line-height:1}
.g-list{flex:1;overflow-y:auto;background:var(--panel)}
.erow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s;background:var(--panel)}
.erow:hover{background:var(--hover)}
.erow.unread{background:var(--cal-td)}
.erow.sel-row{background:rgba(26,115,232,.1)}
.e-chk{width:18px;flex-shrink:0;display:flex;align-items:center}
.e-chk input{width:15px;height:15px;cursor:pointer;accent-color:var(--blue)}
.av{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.e-meta{flex:1;min-width:0}
.e-top{display:flex;justify-content:space-between;gap:4px;margin-bottom:2px}
.e-from{font-size:13px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.e-from.fw{font-weight:700}
.e-date{font-size:12px;color:var(--t3);flex-shrink:0}
.e-subj{font-size:13px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.e-subj.fw{font-weight:600}
.e-snip{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.udot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.g-reader{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
.r-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--t3);gap:10px}
.r-hd{padding:12px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--panel)}
.r-subj{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--t1);line-height:1.3}
.r-from{font-size:13px;color:var(--t2);line-height:1.6}
.r-acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn-act{background:none;border:1px solid var(--bd);border-radius:5px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:600;color:var(--t2);transition:all .15s}
.btn-act:hover{background:var(--hover)}
.btn-act.danger:hover{background:#fdeded;color:var(--red);border-color:var(--red)}
.r-body{flex:1;overflow:auto}
.r-frame{width:100%;height:100%;border:none;padding:12px}
.r-back{display:none;align-items:center;gap:7px;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--panel);cursor:pointer;color:var(--blue);font-size:13px;font-weight:600;flex-shrink:0}
/* ── SPLITTERS ── */
.sp-v{width:5px;flex-shrink:0;cursor:col-resize;background:var(--bd);position:relative;transition:background .15s;z-index:10}
.sp-h{height:5px;flex-shrink:0;cursor:row-resize;background:var(--bd);position:relative;transition:background .15s;z-index:10}
.sp-v:hover,.sp-v.on,.sp-h:hover,.sp-h.on{background:var(--blue)}
.sp-v::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2px;height:36px;border-radius:2px;background:rgba(128,128,128,.25)}
.sp-h::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);height:2px;width:36px;border-radius:2px;background:rgba(128,128,128,.25)}
/* ── COLLAPSE ── */
#view-calendar.col .cal-grid-wrap{display:none}
#view-calendar.col{flex:none!important;height:auto!important}
#view-gmail.col .gmail-wrap{display:none}
#view-gmail.col{height:auto!important;flex:none!important}
/* ── STATES ── */
.state{padding:36px 16px;text-align:center;color:var(--t3)}
.state-ic{font-size:30px;margin-bottom:10px}
.state-tx{font-size:14px;font-weight:500}
.btn-retry{margin-top:10px;background:var(--blue);color:#fff;border:none;border-radius:5px;padding:6px 16px;cursor:pointer;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
/* ── BOTTOM NAV ── */
.bnav{display:none;height:var(--bnav);background:var(--panel);border-top:1px solid var(--bd);flex-shrink:0;z-index:200}
.bnav-inner{display:flex;height:100%}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--t3);font-size:11px;font-weight:600;transition:color .15s}
.bnav-btn.on{color:var(--blue)}
.bnav-ic{font-size:23px;line-height:1}
/* ════ DESKTOP ≥768px ════ */
@media(min-width:768px){
  .sp-v{display:block}
  .bnav{display:none}
  #view-tasks{display:none!important}
  #view-calendar{display:flex!important;flex:1;min-height:80px}
  #view-gmail{display:flex!important;flex:none;height:260px}
  .g-list-col{width:320px}
  .r-back{display:none!important}
}
/* ════ MOBILE <768px ════ */
@media(max-width:767px){
  :root{--hd:48px}
  .sidebar{display:none}
  .sp-v,.sp-h{display:none}
  .bnav{display:block}
  .view.on{flex:1}
  .hd-date{display:none}
  .g-labels{width:100%;height:auto;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--bd);padding:4px 6px;gap:3px;display:flex}
  .glbl{border-radius:16px;margin-right:0;white-space:nowrap;padding:5px 10px}
  .gmail-wrap{flex-direction:column}
  .g-main{flex-direction:column;flex:1}
  .g-list-col{flex:1;border-right:none}
  .g-reader{position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;transform:translateX(100%);transition:transform .3s}
  .g-reader.on{transform:none}
  .r-back{display:flex!important}
  #view-gmail .gmail-wrap{position:relative}
  .cal-day{min-height:58px}
  .ev-panel{width:100%;top:var(--hd);bottom:var(--bnav)}
  .btn-col{display:none}
}

/* ── CALENDAR FILTER ── */
.cal-filter-wrap{position:relative}
.cal-filter-panel{display:none;position:absolute;right:0;top:calc(100% + 4px);background:var(--panel);border:1px solid var(--bd);border-radius:10px;box-shadow:0 4px 16px var(--shadow);z-index:400;min-width:220px;padding:8px 0;max-height:320px;overflow-y:auto}
.cal-filter-panel.on{display:block}
.cal-filter-hd{font-size:11px;font-weight:700;color:var(--t3);padding:4px 14px 8px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);margin-bottom:4px}
.cal-filter-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .15s}
.cal-filter-item:hover{background:var(--hover)}
.cal-fi-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.cal-fi-name{flex:1;font-size:13px;color:var(--t1)}
.cal-fi-chk{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
</style>
</head>

<body>
<header class="hd">
  <span class="hd-title">🗂️ Dashboard</span>
  <span class="hd-date" id="hdate"></span>
  <div class="hd-r">
    <button id="btn-theme" class="btn-ghost" onclick="toggleDark()">🌙</button>
    <span id="tag-conn" style="display:none;opacity:.8;font-size:12px">✅ 연결됨</span>
    <button id="btn-ref" class="btn-ghost" style="display:none" onclick="loadAll()">↻</button>
    <button id="btn-reauth" class="btn-ghost" style="display:none" onclick="signIn()">🔑 재인증</button>
    <button id="btn-login" class="btn-login" onclick="signIn()">🔑 Google 로그인</button>
  </div>
</header>

<script>
const CID='809713924882-6h063f11qhltjkv3n4l209caa53eoim8.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/tasks https://www.googleapis.com/auth/calendar.events https://mail.google.com/';
const AVCOLS=['#EA4335','#4285F4','#34A853','#FBBC04','#9C27B0','#FF6D00'];
const ECOLS=[
  {id:'',name:'캘린더 색상',hex:''},
  {id:'1',hex:'#7986cb'},{id:'2',hex:'#33b679'},{id:'3',hex:'#8e24aa'},
  {id:'4',hex:'#e67c73'},{id:'5',hex:'#f6c026'},{id:'6',hex:'#f5511d'},
  {id:'7',hex:'#039be5'},{id:'8',hex:'#616161'},{id:'9',hex:'#3f51b5'},
  {id:'10',hex:'#0b8043'},{id:'11',hex:'#d50000'}
];
let TC=null,AT=null,TLid=null,allT=[],calEvs=[],calList=[],calCM={};
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let calFilter={};
let gLabel='INBOX',gMsgs=[],selMsg=null,selIds=new Set();
let pDay='',pEvs=[];
let _efi=-1,_efCal='primary',_efEvId=null,_efColor='';
let _pollTimer=null,_lastInboxUnread=0;

document.getElementById('hdate').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

/* ── INIT ── */
window.addEventListener('load',()=>{
  initDark();
  initSplitters();
  renderCalGrid();
  tryGoogle();
  if(window.innerWidth>=768){
    document.getElementById('view-calendar').classList.add('on');
    document.getElementById('view-gmail').classList.add('on');
  } else {
    document.getElementById('view-calendar').classList.add('on');
  }
});

/* ── AUTO POLL ── */
function startPoll(){
  if(_pollTimer)clearInterval(_pollTimer);
  _pollTimer=setInterval(pollMail,60000);
}
function stopPoll(){
  if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}
}
async function pollMail(){
  if(!AT)return;
  try{
    const d=await req('https://gmail.googleapis.com/gmail/v1/users/me/labels/INBOX');
    const newUnread=d.messagesUnread||0;
    if(newUnread>_lastInboxUnread){
      const diff=newUnread-_lastInboxUnread;
      showToast(`📬 새 메일 ${diff}개가 도착했습니다!`);
      if(gLabel==='INBOX')loadGmail();
      loadLabelCounts();
    } else {
      loadLabelCounts();
    }
    _lastInboxUnread=newUnread;
  }catch{}
}
function showToast(msg){
  let t=document.getElementById('g-toast');
  if(!t){
    t=document.createElement('div');
    t.id='g-toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:12px 20px;border-radius:24px;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(26,115,232,.45);z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._hide);
  t._hide=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},4000);
}

function tryGoogle(){
  if(typeof google!=='undefined'&&google.accounts){
    TC=google.accounts.oauth2.initTokenClient({
      client_id:CID,scope:SCOPES,
      callback:r=>{if(!r.error){AT=r.access_token;onLogin();}}
    });
  } else { setTimeout(tryGoogle,150); }
}

function signIn(){if(TC)TC.requestAccessToken({prompt:'consent'});}

function onLogin(){
  document.getElementById('btn-login').style.display='none';
  document.getElementById('tag-conn').style.display='';
  document.getElementById('btn-ref').style.display='';
  document.getElementById('btn-reauth').style.display='';
  loadAll();
}

async function loadAll(){
  await loadCalColors();
  loadTasks();
  loadCalendar();
  loadGmail();
  loadLabelCounts();
  startPoll();
}

async function req(url,opt={}){
  const r=await fetch(url,{...opt,headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json',...(opt.headers||{})}});
  if(r.status===204)return{};
  if(!r.ok)throw new Error(r.status);
  return r.json();
}

/* ── DARK MODE ── */
function initDark(){
  const s=localStorage.getItem('g-theme');
  const sys=window.matchMedia('(prefers-color-scheme: dark)').matches;
  setDark(s==='dark'||(s===null&&sys));
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',e=>{
    if(!localStorage.getItem('g-theme'))setDark(e.matches);
  });
}
function setDark(on){
  document.body.classList.toggle('dark',on);
  const b=document.getElementById('btn-theme');
  if(b)b.textContent=on?'☀️':'🌙';
}
function toggleDark(){
  const on=document.body.classList.toggle('dark');
  localStorage.setItem('g-theme',on?'dark':'light');
  const b=document.getElementById('btn-theme');
  if(b)b.textContent=on?'☀️':'🌙';
}

/* ── NAV ── */
function mNav(n,el){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+n).classList.add('on');
}

/* ── COLLAPSE ── */
function colToggle(n){
  const v=document.getElementById('view-'+n);
  const b=document.getElementById('btn-col-'+n);
  const c=v.classList.toggle('col');
  if(b)b.textContent=c?'▶':'▼';
  if(!c&&n==='calendar')setTimeout(fitCal,50);
}

/* ── SPLITTERS ── */
function initSplitters(){
  const spv=document.getElementById('sp-v'),sb=document.querySelector('.sidebar');
  if(spv&&sb){
    const sw=localStorage.getItem('sp-sw');
    if(sw)sb.style.width=sw+'px';
    let drag=false,sx=0,sw0=0;
    spv.addEventListener('mousedown',e=>{e.preventDefault();drag=true;sx=e.clientX;sw0=sb.offsetWidth;spv.classList.add('on');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
    document.addEventListener('mousemove',e=>{if(!drag)return;sb.style.width=Math.max(160,Math.min(480,sw0+(e.clientX-sx)))+'px';});
    document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;spv.classList.remove('on');document.body.style.cursor='';document.body.style.userSelect='';localStorage.setItem('sp-sw',sb.offsetWidth);});
  }
  const sph=document.getElementById('sp-h'),cal=document.getElementById('view-calendar'),gm=document.getElementById('view-gmail');
  if(sph&&cal&&gm){
    const sc=localStorage.getItem('sp-ch'),sg=localStorage.getItem('sp-gh');
    if(sc&&sg&&window.innerWidth>=768){cal.style.height=sc+'px';cal.style.flex='none';gm.style.height=sg+'px';gm.style.flex='none';}
    let drag=false,sy=0,ch0=0,gh0=0;
    sph.addEventListener('mousedown',e=>{if(window.innerWidth<768)return;e.preventDefault();drag=true;sy=e.clientY;ch0=cal.offsetHeight;gh0=gm.offsetHeight;sph.classList.add('on');document.body.style.cursor='row-resize';document.body.style.userSelect='none';});
    document.addEventListener('mousemove',e=>{
      if(!drag)return;
      const d=e.clientY-sy;
      cal.style.height=Math.max(80,ch0+d)+'px';cal.style.flex='none';
      gm.style.height=Math.max(80,gh0-d)+'px';gm.style.flex='none';
      fitCal();
    });
    document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;sph.classList.remove('on');document.body.style.cursor='';document.body.style.userSelect='';localStorage.setItem('sp-ch',cal.offsetHeight);localStorage.setItem('sp-gh',gm.offsetHeight);});
  }
  window.addEventListener('resize',()=>setTimeout(fitCal,50));
}

/* ── TASKS ── */
function togTForm(s){document.getElementById('t-form-'+s)?.classList.toggle('on');}
async function loadTasks(){
  loading('t-list-d','…');loading('t-list-m','…');
  try{
    const lists=await req('https://tasks.googleapis.com/tasks/v1/users/@me/lists');
    if(!lists.items?.length){setEmpty('t-list-d','📝','태스크 없음');setEmpty('t-list-m','📝','태스크 없음');return;}
    TLid=lists.items[0].id;
    const r=await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks?showCompleted=true&maxResults=100`);
    allT=r.items||[];renderTasks();addTasksToCal();
  }catch{setErr('t-list-d','불러오기 실패',loadTasks);setErr('t-list-m','불러오기 실패',loadTasks);}
}
function renderTasks(){
  const act=allT.filter(t=>t.status!=='completed'),done=allT.filter(t=>t.status==='completed');
  const cnt=act.length;
  ['t-badge','t-badge-m'].forEach(id=>{const b=document.getElementById(id);if(b){b.textContent=cnt;b.style.background=cnt?'var(--yellow)':'var(--t3)';}});
  let h=act.length===0&&done.length===0?`<div class="state"><div class="state-ic">🎉</div><div class="state-tx">모두 완료!</div></div>`:'';
  act.forEach(t=>h+=tHtml(t,false));
  if(done.length){h+=`<div class="sec-lbl">완료 (${done.length})</div>`;done.forEach(t=>h+=tHtml(t,true));}
  ['t-list-d','t-list-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=h;});
}
function tHtml(t,done){
  const due=t.due?new Date(t.due).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}):'';
  const over=t.due&&!done&&new Date(t.due)<new Date();
  return`<div class="t-item">
    <input type="checkbox" ${done?'checked':''} onchange="${done?`unco('${t.id}')`:`co('${t.id}')`}"/>
    <div class="t-info">
      <div class="t-txt${done?' done':''}">${esc(t.title)}</div>
      ${due?`<div class="t-meta" style="color:${over?'var(--red)':'var(--t3)'}">📅 ${due}${over?' (기한 초과)':''}</div>`:''}
      ${t.notes?`<div class="t-meta">📝 ${esc(t.notes)}</div>`:''}
    </div>
    <button class="t-del" onclick="delT('${t.id}')">×</button>
  </div>`;
}
async function addTask(s){
  const el=document.getElementById('t-inp-'+s);const v=el.value.trim();if(!v||!TLid)return;
  const due=document.getElementById('t-due-'+s)?.value;
  const note=document.getElementById('t-note-'+s)?.value?.trim();
  const body={title:v};
  if(due)body.due=new Date(due+'T00:00:00').toISOString();
  if(note)body.notes=note;
  el.value='';
  const f=document.getElementById('t-form-'+s);
  if(f){f.classList.remove('on');['t-due-','t-note-'].forEach(p=>{const i=document.getElementById(p+s);if(i)i.value='';});}
  try{const t=await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks`,{method:'POST',body:JSON.stringify(body)});allT.unshift(t);renderTasks();addTasksToCal();}catch{alert('추가 실패');}
}
async function co(id){try{await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:'completed'})});allT=allT.map(t=>t.id===id?{...t,status:'completed'}:t);renderTasks();addTasksToCal();}catch{}}
async function unco(id){try{await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks/${id}`,{method:'PATCH',body:JSON.stringify({status:'needsAction',completed:null})});allT=allT.map(t=>t.id===id?{...t,status:'needsAction'}:t);renderTasks();addTasksToCal();}catch{}}
async function delT(id){try{await fetch(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${AT}` }});allT=allT.filter(t=>t.id!==id);renderTasks();addTasksToCal();}catch{}}
function addTasksToCal(){
  calEvs=calEvs.filter(e=>!e._isT);
  allT.filter(t=>t.due&&t.status!=='completed').forEach(t=>{
    const ds=t.due.split('T')[0];
    calEvs.push({id:'t-'+t.id,summary:t.title,start:{date:ds},end:{date:ds},_col:'#4285F4',_cal:'태스크',_isT:true});
  });
  renderCalGrid();
}

/* ── CALENDAR ── */
async function loadCalColors(){
  try{
    const[cols,list]=await Promise.all([req('https://www.googleapis.com/calendar/v3/colors'),req('https://www.googleapis.com/calendar/v3/users/me/calendarList')]);
    Object.entries(cols.event||{}).forEach(([id,c])=>{const ec=ECOLS.find(e=>e.id===id);if(ec)ec.hex=c.background;});
    calList=list.items||[];calCM={};calList.forEach(c=>{calCM[c.id]=c.backgroundColor||'#4285F4';});
  }catch(e){console.warn('colors',e);}
  loadCalFilter();
  renderCalFilterList();
}
/* ── CALENDAR FILTER ── */
function loadCalFilter(){
  try{ calFilter=JSON.parse(localStorage.getItem('g-cal-filter')||'{}'); }catch{ calFilter={}; }
}
function saveCalFilter(){
  localStorage.setItem('g-cal-filter',JSON.stringify(calFilter));
}
function toggleCalFilterPanel(){
  const panel=document.getElementById('cal-filter-panel');
  if(!panel)return;
  panel.classList.toggle('on');
  if(panel.classList.contains('on'))renderCalFilterList();
}
function renderCalFilterList(){
  const list=document.getElementById('cal-filter-list');
  if(!list){return;}
  if(!calList.length){
    list.innerHTML='<div style="padding:10px 14px;font-size:12px;color:var(--t3)">로그인 후 이용 가능해요</div>';
    return;
  }
  list.innerHTML='';
  calList.forEach(function(cal){
    const enabled=calFilter[cal.id]!==false;
    const color=cal.backgroundColor||'#4285F4';
    const label=document.createElement('label');
    label.className='cal-filter-item';
    const dot=document.createElement('span');
    dot.className='cal-fi-dot';
    dot.style.background=color;
    const name=document.createElement('span');
    name.className='cal-fi-name';
    name.textContent=cal.summary||cal.id;
    const chk=document.createElement('input');
    chk.type='checkbox';
    chk.className='cal-fi-chk';
    chk.checked=enabled;
    chk.addEventListener('change',function(){setCalFilter(cal.id,this.checked);});
    label.appendChild(dot);
    label.appendChild(name);
    label.appendChild(chk);
    list.appendChild(label);
  });
}
function setCalFilter(calId,enabled){
  if(enabled){ delete calFilter[calId]; }
  else { calFilter[calId]=false; }
  saveCalFilter();
  loadCalendar();
}
document.addEventListener('click',function(e){
  var panel=document.getElementById('cal-filter-panel');
  var btn=document.getElementById('btn-cal-filter');
  if(panel&&panel.classList.contains('on')&&!panel.contains(e.target)&&e.target!==btn){
    panel.classList.remove('on');
  }
});

function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCalGrid();loadCalendar();}
function calToday(){calY=new Date().getFullYear();calM=new Date().getMonth();renderCalGrid();loadCalendar();}

function renderCalGrid(){
  const DAYS=['일','월','화','수','목','금','토'],today=new Date();
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0);
  document.getElementById('cal-lbl').textContent=`${calY}년 ${calM+1}월`;
  document.getElementById('cal-dow').innerHTML=DAYS.map(d=>`<div class="cal-dow-cell">${d}</div>`).join('');
  let h='';
  for(let i=0;i<first.getDay();i++){const d=new Date(calY,calM,1-first.getDay()+i);h+=`<div class="cal-day other"><div class="cal-dn">${d.getDate()}</div></div>`;}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const evs=calEvs.filter(e=>(e.start?.dateTime||e.start?.date||'').split('T')[0]===ds);
    let ev=evs.slice(0,3).map(e=>e._isT
      ?`<div class="cal-ev task-ev"><span class="task-dot"></span>${esc(e.summary||'')}</div>`
      :`<div class="cal-ev" style="background:${e._col||'#4285F4'}">${esc(e.summary||'일정')}</div>`
    ).join('');
    if(evs.length>3)ev+=`<div class="cal-more">+${evs.length-3}</div>`;
    h+=`<div class="cal-day${isT?' today-c':''}" onclick="showDay('${ds}')"><div class="cal-dn">${d}</div>${ev}</div>`;
  }
  const rem=(first.getDay()+last.getDate())%7;if(rem>0)for(let i=1;i<=7-rem;i++)h+=`<div class="cal-day other"><div class="cal-dn">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=h;
  fitCal();
}

function fitCal(){
  if(window.innerWidth<768)return;
  const grid=document.getElementById('cal-grid');if(!grid)return;
  const h=grid.offsetHeight;if(!h)return;
  const cells=grid.querySelectorAll('.cal-day');if(!cells.length)return;
  const rows=Math.ceil(cells.length/7);
  grid.style.gridTemplateRows=`repeat(${rows},${Math.max(38,Math.floor(h/rows))}px)`;
}

async function loadCalendar(){
  try{
    const from=new Date(calY,calM,1).toISOString(),to=new Date(calY,calM+1,0,23,59,59).toISOString();
    calEvs=calEvs.filter(e=>e._isT);
    const src=calList.length?calList:[{id:'primary',backgroundColor:'#4285F4',summary:''}];
    for(const cal of src){
      if(calFilter[cal.id]===false)continue;
      try{
        const data=await req(`https://www.googleapis.com/calendar/v3/calendars/${enc(cal.id)}/events?timeMin=${enc(from)}&timeMax=${enc(to)}&singleEvents=true&orderBy=startTime&maxResults=100`);
        (data.items||[]).forEach(e=>{
          let col=calCM[cal.id]||'#4285F4';
          if(e.colorId){const ec=ECOLS.find(x=>x.id===e.colorId);if(ec?.hex)col=ec.hex;}
          calEvs.push({...e,_col:col,_cal:cal.summary,_calId:cal.id});
        });
      }catch{}
    }
    calEvs.sort((a,b)=>(a.start?.dateTime||a.start?.date||'').localeCompare(b.start?.dateTime||b.start?.date||''));
    renderCalGrid();
  }catch(e){console.error(e);}
}

/* ── EVENT PANEL ── */
function showDay(ds){
  pDay=ds;pEvs=calEvs.filter(e=>(e.start?.dateTime||e.start?.date||'').split('T')[0]===ds&&!e._isT);
  document.getElementById('ev-ph-ttl').textContent=new Date(ds+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  renderEP();
  document.getElementById('ev-panel').classList.add('on');
}
function renderEP(){
  document.getElementById('ev-body').innerHTML=pEvs.length
    ?pEvs.map((e,i)=>`<div class="ev-card" id="evc${i}" style="background:${e._col}18;border-color:${e._col}">
        <div class="ev-card-title">${esc(e.summary||'(제목 없음)')}</div>
        <div class="ev-card-sub">${!e.start?.dateTime?'종일':`${ft(e.start.dateTime)} — ${ft(e.end.dateTime)}`}${e._cal?` · ${esc(e._cal)}`:''}</div>
        ${e.location?`<div class="ev-card-sub">📍 ${esc(e.location)}</div>`:''}
        ${e.description?`<div class="ev-card-sub" style="font-size:11px">📝 ${esc(e.description.slice(0,60))}${e.description.length>60?'…':''}</div>`:''}
        <div class="ev-card-acts">
          <button class="btn-ev" onclick="event.stopPropagation();showEF(${i})">✏️ 수정</button>
          <button class="btn-ev del" onclick="event.stopPropagation();delEv(${i})">🗑️ 삭제</button>
        </div>
      </div>`).join('')
    :`<div class="ev-none">이 날은 일정이 없어요</div>`;
}
function closeEP(){document.getElementById('ev-panel').classList.remove('on');}

// 외부 클릭 시 패널 닫기
document.addEventListener('click',e=>{
  const p=document.getElementById('ev-panel');
  if(!p?.classList.contains('on'))return;
  if(e.composedPath&&e.composedPath().includes(p))return;
  if(e.target.closest?.('.cal-day'))return;
  closeEP();
});

/* ── EVENT FORM (create + edit) ── */
function showEF(idx){
  _efi=idx;
  const isE=idx>=0,ev=isE?pEvs[idx]:null;
  const allDay=isE?!ev?.start?.dateTime:true;
  _efCal=isE?(ev?._calId||'primary'):(calList[0]?.id||'primary');
  _efEvId=isE?ev?.id:null;
  _efColor=isE?(ev?.colorId||''):'';
  const title=isE?(ev?.summary||''):'';
  const startV=isE?toLDT(ev?.start?.dateTime):(pDay+'T09:00');
  const endV=isE?toLDT(ev?.end?.dateTime):(pDay+'T10:00');
  const loc=isE?(ev?.location||''):'';
  const desc=isE?(ev?.description||''):'';
  const curCal=calList.find(c=>c.id===_efCal)||calList[0]||{backgroundColor:'#4285F4',summary:'기본 캘린더'};
  const calOpts=calList.map(c=>`<div class="ev-cal-opt" onclick="event.stopPropagation();selEfCal('${ea(c.id)}','${ea(c.summary)}','${c.backgroundColor||'#4285F4'}')"><span class="ev-cdot" style="background:${c.backgroundColor||'#4285F4'}"></span>${esc(c.summary)}</div>`).join('')||'<div class="ev-cal-opt">기본 캘린더</div>';
  const chips=ECOLS.map(c=>{
    const bg=c.hex||(curCal.backgroundColor||'#4285F4'),sel=c.id===_efColor;
    return`<div class="ev-chip${sel?' sel':''}" onclick="event.stopPropagation();selEfColor('${c.id}',this)" title="${c.id?'색상 '+c.id:'캘린더 기본색'}" style="background:${bg};${!c.hex?'border:2px dashed var(--t3)':''}">${sel?'<span style="font-size:9px;color:#fff;font-weight:700">✓</span>':''}</div>`;
  }).join('');

  document.getElementById('ev-ph-ttl').textContent=isE?'일정 수정':'새 일정';
  document.getElementById('ev-body').innerHTML=`<div class="ev-form">
    <input class="ef-inp" id="ef-ttl" placeholder="제목 (필수)" value="${esc(title)}" style="font-size:15px;font-weight:600;padding:9px 10px"/>
    <div class="ef-sect">
      <div class="ef-row"><span class="ef-lbl">종일</span><input type="checkbox" class="ef-chk" id="ef-ad" ${allDay?'checked':''} onchange="togAD()"/></div>
      <div id="ef-dw" style="${allDay?'':'display:none'}"><div class="ef-row"><span class="ef-lbl">날짜</span><input type="date" class="ef-sel" id="ef-dt" value="${pDay}"/></div></div>
      <div id="ef-tw" style="${allDay?'display:none':'flex'};flex-direction:column;gap:5px">
        <div class="ef-row"><span class="ef-lbl">시작</span><input type="datetime-local" class="ef-sel" id="ef-st" value="${startV}"/></div>
        <div class="ef-row"><span class="ef-lbl">종료</span><input type="datetime-local" class="ef-sel" id="ef-et" value="${endV}"/></div>
      </div>
      <div class="ef-row"><span class="ef-lbl">반복</span>
        <select class="ef-sel" id="ef-rep">
          <option value="">반복 없음</option>
          <option value="RRULE:FREQ=DAILY">매일</option>
          <option value="RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR">주중 (월~금)</option>
          <option value="RRULE:FREQ=WEEKLY">매주</option>
          <option value="RRULE:FREQ=MONTHLY">매월</option>
          <option value="RRULE:FREQ=YEARLY">매년</option>
        </select>
      </div>
    </div>
    <div class="ef-sect">
      <div class="ef-row"><span class="ef-lbl">📍 장소</span><input class="ef-inp" id="ef-loc" placeholder="장소" value="${esc(loc)}"/></div>
      <div class="ef-row"><span class="ef-lbl">📝 설명</span><textarea class="ef-inp" id="ef-desc" placeholder="설명" rows="2" style="resize:vertical">${esc(desc)}</textarea></div>
    </div>
    <div class="ef-sect">
      <div class="ef-row"><span class="ef-lbl">👥 초대</span><input class="ef-inp" id="ef-gs" placeholder="이메일 (쉼표로 구분)"/></div>
      <div class="ef-row">
        <span class="ef-lbl">🔔 알림</span>
        <select class="ef-sel" id="ef-nm" style="width:70px;flex:none"><option value="popup">팝업</option><option value="email">메일</option></select>
        <input type="number" class="ef-inp" id="ef-nmin" value="10" min="0" style="width:60px;flex:none"/>
        <span style="font-size:12px;color:var(--t3)">분 전</span>
      </div>
    </div>
    <div class="ef-sect">
      <div style="font-size:12px;color:var(--t3);font-weight:600;margin-bottom:3px">📅 캘린더</div>
      <div style="position:relative">
        <div class="ev-cal-btn" onclick="event.stopPropagation();togEfCal()">
          <span class="ev-cdot" id="ef-cdot" style="background:${curCal.backgroundColor||'#4285F4'}"></span>
          <span id="ef-cname" style="font-size:13px;color:var(--t1);flex:1">${esc(curCal.summary||'기본')}</span>
          <span style="font-size:10px;color:var(--t3)">▼</span>
        </div>
        <div class="ev-cal-list" id="ef-clist">${calOpts}</div>
      </div>
    </div>
    <div class="ef-sect">
      <div style="font-size:12px;color:var(--t3);font-weight:600;margin-bottom:5px">🎨 이벤트 색상</div>
      <div class="ev-chips">${chips}</div>
    </div>
    <div style="display:flex;gap:8px;padding-top:4px">
      <button class="btn-ev-save" onclick="event.stopPropagation();saveEF()" style="flex:1;padding:9px">💾 ${isE?'수정 저장':'일정 저장'}</button>
      <button class="btn-ev-cancel" onclick="event.stopPropagation();showDay(pDay)" style="flex:1;padding:9px">취소</button>
    </div>
  </div>`;
}

function togAD(){const a=document.getElementById('ef-ad')?.checked;const dw=document.getElementById('ef-dw');const tw=document.getElementById('ef-tw');if(dw)dw.style.display=a?'':'none';if(tw)tw.style.display=a?'none':'flex';}
function togEfCal(){const l=document.getElementById('ef-clist');if(!l)return;l.style.display=getComputedStyle(l).display==='none'?'block':'none';}
function selEfCal(id,name,col){_efCal=id;const d=document.getElementById('ef-cdot'),n=document.getElementById('ef-cname'),l=document.getElementById('ef-clist');if(d)d.style.background=col;if(n)n.textContent=name;if(l)l.style.display='none';}
function selEfColor(id,el){_efColor=id;document.querySelectorAll('.ev-chip').forEach(c=>{c.classList.remove('sel');c.innerHTML='';});if(el){el.classList.add('sel');el.innerHTML='<span style="font-size:9px;color:#fff;font-weight:700">✓</span>';}}
function ea(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function toLDT(iso){if(!iso)return'';try{const d=new Date(iso);return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);}catch{return'';}}

async function saveEF(){
  const isE=_efi>=0;
  const title=(document.getElementById('ef-ttl')?.value||'').trim();
  if(!title){alert('제목을 입력해주세요');return;}
  const ad=document.getElementById('ef-ad')?.checked;
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const loc=document.getElementById('ef-loc')?.value?.trim();
  const desc=document.getElementById('ef-desc')?.value?.trim();
  const gs=document.getElementById('ef-gs')?.value?.trim();
  const rep=document.getElementById('ef-rep')?.value;
  const nm=document.getElementById('ef-nm')?.value||'popup';
  const nmin=parseInt(document.getElementById('ef-nmin')?.value||'10');
  const body={summary:title};
  if(loc)body.location=loc;if(desc)body.description=desc;if(_efColor)body.colorId=_efColor;
  if(gs)body.attendees=gs.split(',').map(g=>({email:g.trim()})).filter(g=>g.email.includes('@'));
  if(rep)body.recurrence=[rep];
  if(!isNaN(nmin))body.reminders={useDefault:false,overrides:[{method:nm,minutes:nmin}]};
  if(ad){const dt=document.getElementById('ef-dt')?.value||pDay;body.start={date:dt};body.end={date:dt};}
  else{
    const sv=document.getElementById('ef-st')?.value,ev=document.getElementById('ef-et')?.value;
    if(!sv||!ev){alert('시간을 입력해주세요');return;}
    if(new Date(sv)>=new Date(ev)){alert('종료가 시작보다 늦어야 해요');return;}
    body.start={dateTime:new Date(sv).toISOString(),timeZone:tz};
    body.end={dateTime:new Date(ev).toISOString(),timeZone:tz};
  }
  try{
    const ce=encodeURIComponent(_efCal||'primary');
    const url=isE?`https://www.googleapis.com/calendar/v3/calendars/${ce}/events/${encodeURIComponent(_efEvId)}`:`https://www.googleapis.com/calendar/v3/calendars/${ce}/events`;
    const r=await fetch(url,{method:isE?'PATCH':'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
    await loadCalendar();
    pEvs=calEvs.filter(e=>(e.start?.dateTime||e.start?.date||'').split('T')[0]===pDay&&!e._isT);
    renderEP();
  }catch(err){alert((isE?'수정':'저장')+' 실패: '+err.message);}
}

async function delEv(i){
  const e=pEvs[i];if(!confirm(`"${e.summary||'이 일정'}"을 삭제할까요?`))return;
  try{
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(e._calId||'primary')}/events/${encodeURIComponent(e.id)}`,{method:'DELETE',headers:{Authorization:`Bearer ${AT}`}});
    if(!r.ok&&r.status!==204)throw new Error(r.status);
    calEvs=calEvs.filter(ev=>ev.id!==e.id);pEvs=pEvs.filter((_,idx)=>idx!==i);renderCalGrid();renderEP();
  }catch(err){alert('삭제 실패: '+err.message);}
}

/* ── GMAIL ── */
async function selLabel(lbl,el){
  document.querySelectorAll('.glbl').forEach(g=>g.classList.remove('on'));el.classList.add('on');
  gLabel=lbl;clearSel();closeReader();document.getElementById('g-srch').value='';
  const tb=document.getElementById('btn-empty-trash');if(tb)tb.style.display=lbl==='TRASH'?'':'none';
  await loadGmail();
}
async function loadGmail(){
  loading('g-list','메일 불러오는 중…');
  try{
    const data=await req(`https://gmail.googleapis.com/gmail/v1/users/me/messages?labelIds=${gLabel}&maxResults=25`);
    if(!data.messages?.length){setEmpty('g-list','📭','메일이 없어요');return;}
    const details=await Promise.all(data.messages.map(m=>req(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`)));
    gMsgs=details;renderList();
  }catch{setErr('g-list','메일을 불러올 수 없어요',loadGmail);}
}
async function searchMail(){
  const q=document.getElementById('g-srch').value.trim();if(!q)return;
  loading('g-list','검색 중…');
  try{
    const data=await req(`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${enc(q)}&maxResults=25`);
    if(!data.messages?.length){setEmpty('g-list','🔍','검색 결과 없음');return;}
    const details=await Promise.all(data.messages.map(m=>req(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`)));
    gMsgs=details;renderList();
  }catch{setErr('g-list','검색 실패',loadGmail);}
}
function renderList(){
  document.getElementById('g-lbl').textContent=`Gmail · ${gMsgs.length}개`;
  if(!gMsgs.length){setEmpty('g-list','📭','메일이 없어요');return;}
  let h='';
  gMsgs.forEach((m,i)=>{
    const hd=m.payload?.headers||[];
    const from=hd.find(h=>h.name==='From')?.value||'';
    const subj=hd.find(h=>h.name==='Subject')?.value||'(제목 없음)';
    const date=hd.find(h=>h.name==='Date')?.value||'';
    const unread=m.labelIds?.includes('UNREAD'),sel=selIds.has(m.id);
    const name=from.replace(/<[^>]+>/,'').trim()||from;
    const init=(name[0]||'?').toUpperCase();
    h+=`<div class="erow${unread?' unread':''}${sel?' sel-row':''}" id="er${i}">
      <div class="e-chk" onclick="togSel(event,'${m.id}',${i})"><input type="checkbox" ${sel?'checked':''} onclick="togSel(event,'${m.id}',${i})"/></div>
      <div class="av" style="background:${AVCOLS[init.charCodeAt(0)%AVCOLS.length]}" onclick="openMsg(${i})">${esc(init)}</div>
      <div class="e-meta" onclick="openMsg(${i})">
        <div class="e-top"><span class="e-from${unread?' fw':''}">${esc(name)}</span><span class="e-date">${esc(fmtDate(date))}</span></div>
        <div class="e-subj${unread?' fw':''}">${esc(subj)}</div>
        <div class="e-snip">${esc(m.snippet||'')}</div>
      </div>
      ${unread?'<div class="udot"></div>':''}
    </div>`;
  });
  document.getElementById('g-list').innerHTML=h;updSelBar();
}
function togSel(e,id,i){e.stopPropagation();selIds.has(id)?selIds.delete(id):selIds.add(id);updSelBar();const row=document.getElementById('er'+i);if(row){row.classList.toggle('sel-row',selIds.has(id));const c=row.querySelector('input[type=checkbox]');if(c)c.checked=selIds.has(id);}}
function updSelBar(){
  const cnt=selIds.size;
  document.getElementById('sel-bar').classList.toggle('on',cnt>0);
  document.getElementById('sel-cnt').textContent=`${cnt}개 선택`;
  const chk=document.getElementById('chk-all');
  if(chk){chk.checked=cnt>0&&cnt===gMsgs.length;chk.indeterminate=cnt>0&&cnt<gMsgs.length;}
  const sc=document.getElementById('g-sel-cnt');
  if(sc)sc.textContent=gMsgs.length?`${gMsgs.length}개 중 ${cnt}개`:'';
}
function selectAll(c){if(c)gMsgs.forEach(m=>selIds.add(m.id));else selIds.clear();updSelBar();renderList();}
function clearSel(){selIds.clear();updSelBar();renderList();}
async function batchDel(){
  const ids=[...selIds];if(!ids.length)return;
  const inTrash=gLabel==='TRASH';
  if(!confirm(inTrash?`${ids.length}개 메일을 영구 삭제할까요? 복구 불가합니다.`:`${ids.length}개 메일을 삭제할까요?`))return;
  try{
    if(inTrash){
      await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/batchDelete',{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({ids})});
    } else {
      await Promise.all(ids.map(id=>fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}/trash`,{method:'POST',headers:{Authorization:`Bearer ${AT}`}})));
    }
    clearSel();loadGmail();loadLabelCounts();
  } catch(e){alert('삭제 실패: '+e.message);}
}
async function batchRead(){
  const ids=[...selIds];if(!ids.length)return;
  try{await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/batchModify',{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({ids,removeLabelIds:['UNREAD']})});clearSel();loadGmail();loadLabelCounts();}catch{}
}
async function emptyTrash(){
  if(!confirm('휴지통을 모두 비울까요? 복구 불가합니다.'))return;
  loading('g-list','비우는 중…');
  try{
    let pt='',ids=[];
    do{const d=await req(`https://gmail.googleapis.com/gmail/v1/users/me/messages?labelIds=TRASH&maxResults=500${pt?'&pageToken='+pt:''}`);ids=[...ids,...(d.messages||[]).map(m=>m.id)];pt=d.nextPageToken||'';}while(pt);
    if(!ids.length){setEmpty('g-list','🗑️','이미 비어있어요');return;}
    for(let i=0;i<ids.length;i+=500)await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/batchDelete',{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({ids:ids.slice(i,i+500)})});
    loadGmail();loadLabelCounts();
  }catch(e){setErr('g-list','비우기 실패',emptyTrash);}
}
async function permDeleteMsg(){
  if(!selMsg)return;
  if(!confirm('이 메일을 영구 삭제할까요? 복구 불가합니다.'))return;
  try{
    const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selMsg.id}`,{method:'DELETE',headers:{Authorization:`Bearer ${AT}`}});
    if(!r.ok&&r.status!==204)throw new Error(r.status);
    closeReader();loadGmail();loadLabelCounts();
  }catch(e){alert('삭제 실패: '+e.message);}
}
async function loadLabelCounts(){
  for(const lbl of ['INBOX','STARRED','SENT','SPAM','TRASH']){
    try{
      const d=await req(`https://gmail.googleapis.com/gmail/v1/users/me/labels/${lbl}`);
      const u=d.messagesUnread||0;
      if(lbl==='INBOX' && _lastInboxUnread===0){
        _lastInboxUnread=u;
      }
      const el=document.getElementById('lcnt-'+lbl);
      if(el){
        el.textContent=u>99?'99+':u;
        el.style.display=u>0?'':'none';
      }
    }catch{}
  }
}
async function openMsg(i){
  document.querySelectorAll('.erow').forEach(r=>r.classList.remove('sel-row'));
  document.getElementById('er'+i)?.classList.add('sel-row');
  try{
    const full=await req(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${gMsgs[i].id}?format=full`);
    selMsg=full;
    const hd=full.payload?.headers||[];
    document.getElementById('r-subj').textContent=hd.find(h=>h.name==='Subject')?.value||'(제목 없음)';
    const from=hd.find(h=>h.name==='From')?.value||'',to=hd.find(h=>h.name==='To')?.value||'',date=hd.find(h=>h.name==='Date')?.value||'';
    document.getElementById('r-from').innerHTML=`<b>보낸사람:</b> ${esc(from)}<br><b>받는사람:</b> ${esc(to)}<br><b>날짜:</b> ${esc(date)}`;
    const _body=getBody(full.payload)||'<p style="padding:16px;color:#999">본문 없음</p>';
    const _wrapped='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="color-scheme" content="only light"><style>:root{color-scheme:only light;}html,body{margin:0;padding:0;background:#fff!important;color:#202124!important;}body{padding:14px;font-family:sans-serif;font-size:14px;line-height:1.6;word-break:break-word;}*{max-width:100%;box-sizing:border-box;}img{max-width:100%;height:auto;}a{color:#1a73e8;}pre{white-space:pre-wrap;font-family:inherit;}</style></head><body>'+_body+'</body></html>';
    document.getElementById('r-frame').srcdoc=_wrapped;
    document.getElementById('r-ph').style.display='none';
    const rc=document.getElementById('r-content');rc.style.display='flex';rc.style.flexDirection='column';rc.style.overflow='hidden';
    document.getElementById('g-reader').classList.add('on');
    const spamBtn=document.getElementById('btn-spam-act');
    if(spamBtn){
      if(full.labelIds?.includes('SPAM')){
        spamBtn.textContent='✅ 스팸 해제';spamBtn.onclick=unmarkSpam;
      } else {
        spamBtn.textContent='🚫 스팸';spamBtn.onclick=markSpam;
      }
    }
    if(full.labelIds?.includes('UNREAD')){
      await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${full.id}/modify`,{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({removeLabelIds:['UNREAD']})});
      gMsgs[i]={...gMsgs[i],labelIds:(gMsgs[i].labelIds||[]).filter(l=>l!=='UNREAD')};
      renderList();document.getElementById('er'+i)?.classList.add('sel-row');
    }
  }catch(e){console.error(e);}
}
function getBody(p){if(!p)return null;if(p.body?.data)return decB(p.body.data);if(p.parts){const h=p.parts.find(x=>x.mimeType==='text/html');if(h?.body?.data)return decB(h.body.data);const t=p.parts.find(x=>x.mimeType==='text/plain');if(t?.body?.data)return`<pre style="white-space:pre-wrap;font:14px/1.5 sans-serif;padding:14px">${esc(decB(t.body.data))}</pre>`;for(const x of p.parts){const b=getBody(x);if(b)return b;}}return null;}
function decB(s){try{return decodeURIComponent(atob(s.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));}catch{return atob(s.replace(/-/g,'+').replace(/_/g,'/'));}}
function closeReader(){selMsg=null;document.getElementById('g-reader').classList.remove('on');document.getElementById('r-ph').style.display='';document.getElementById('r-content').style.display='none';}
async function deleteMsg(){
  if(!selMsg)return;
  if(gLabel==='TRASH'){
    await permDeleteMsg();
  } else {
    if(!confirm('휴지통으로 이동할까요?'))return;
    try{
      const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selMsg.id}/trash`,{method:'POST',headers:{Authorization:`Bearer ${AT}`}});
      if(!r.ok)throw new Error(r.status);
      closeReader();loadGmail();loadLabelCounts();
    }catch(e){alert('삭제 실패: '+e.message);}
  }
}
async function unmarkSpam(){
  if(!selMsg)return;
  try{
    await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selMsg.id}/modify`,{
      method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},
      body:JSON.stringify({removeLabelIds:['SPAM'],addLabelIds:['INBOX']})
    });
    closeReader();loadGmail();loadLabelCounts();
  }catch(e){alert('스팸 해제 실패: '+e.message);}
}
async function markSpam(){if(!selMsg)return;try{await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selMsg.id}/modify`,{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({addLabelIds:['SPAM'],removeLabelIds:['INBOX']})});closeReader();loadGmail();loadLabelCounts();}catch{}}
async function markRead(){if(!selMsg)return;try{await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selMsg.id}/modify`,{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify({removeLabelIds:['UNREAD']})});loadGmail();loadLabelCounts();}catch{}}
async function toggleStar(){if(!selMsg)return;const on=selMsg.labelIds?.includes('STARRED');try{await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${selMsg.id}/modify`,{method:'POST',headers:{Authorization:`Bearer ${AT}`,'Content-Type':'application/json'},body:JSON.stringify(on?{removeLabelIds:['STARRED']}:{addLabelIds:['STARRED']})});selMsg={...selMsg,labelIds:on?selMsg.labelIds.filter(l=>l!=='STARRED'):[...(selMsg.labelIds||[]),'STARRED']};}catch{}}

/* ── UTILS ── */
function ft(iso){try{return new Date(iso).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}catch{return'';}}
function fmtDate(s){try{const d=new Date(s);return(Date.now()-d)<86400000?d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}catch{return'';}}
function enc(s){return encodeURIComponent(s);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function loading(id,t){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="state"><div class="state-ic spin">⏳</div><div class="state-tx" style="margin-top:10px">${t}</div></div>`;}
function setEmpty(id,ic,t){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="state"><div class="state-ic">${ic}</div><div class="state-tx">${t}</div></div>`;}
function setErr(id,t,fn){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="state"><div class="state-ic">⚠️</div><div class="state-tx" style="color:var(--red)">${t}</div><button class="btn-retry" onclick="${fn.name}()">다시 시도</button></div>`;}

</script>
</body>
</html>
